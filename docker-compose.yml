services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: excogni
      POSTGRES_PASSWORD: excogni
      POSTGRES_DB: excogni
    volumes:
      - excogni_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excogni -d excogni"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:5432:5432"

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://excogni:excogni@db:5432/excogni
      ENABLE_SIMULATED_USERS: "true"
      DEV_EXPOSE_MAGIC_LINKS: "true"
      SHOW_DEBUG_UI: "true"
      # stats preview: include simulated users in /statistics (labeled "preview").
      # reads from your .env; set STATS_PREVIEW=true there to demo the page.
      STATS_PREVIEW: ${STATS_PREVIEW:-false}
      # UI languages beyond English (hr/de); reads from your .env. Off = English only.
      ENABLE_LANGS: ${ENABLE_LANGS:-false}
      ORIGIN: http://localhost:3000
      PORT: "3000"
      # admin tool: reads ADMIN_TOKEN from your .env (>=16 chars enables /admin)
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      ADMIN_MIN_CELL: ${ADMIN_MIN_CELL:-20}
      PUBLIC_MIN_CELL: ${PUBLIC_MIN_CELL:-50}
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  excogni_pgdata:
