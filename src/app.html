<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <script>
      // Apply the saved theme synchronously before first paint to avoid a flash of the default
      // palette. Reads the same 'variant' cookie the server uses; 'serious' (or absent) = default.
      try {
        var m = document.cookie.match(/(?:^|; )variant=([^;]+)/);
        var v = m && decodeURIComponent(m[1]);
        if (v && v !== 'serious') document.documentElement.setAttribute('data-variant', v);
      } catch (e) {}
    </script>
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0A0C10" />
    <title>Excogni - a gym for the mind</title>
    <meta name="description" content="Adaptive cognitive challenges that train and measure at once. Open methodology, privacy-first. A shape, not a score." />

    <!-- Open Graph (Facebook, Viber, Slack, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Excogni" />
    <meta property="og:title" content="Excogni - a gym for the mind" />
    <meta property="og:description" content="Adaptive cognitive challenges that train and measure at once. Open methodology, privacy-first. A shape, not a score." />
    <meta property="og:url" content="https://xcgni.com/" />
    <meta property="og:image" content="https://xcgni.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Excogni - a gym for the mind" />
    <meta name="twitter:description" content="Adaptive cognitive challenges that train and measure at once. Open methodology, privacy-first." />
    <meta name="twitter:image" content="https://xcgni.com/og-image.png" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="h-full bg-ink text-body antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
