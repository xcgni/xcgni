<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Excogni - offline</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#0A0C10; color:#E6E8EC; font-family:system-ui,sans-serif; }
  .wrap { display:flex; flex-direction:column; align-items:center; gap:18px; text-align:center; padding:24px; }
  .loader { position:relative; width:52px; height:52px; border-radius:9999px; border:1px solid #202733; }
  .loader::before { content:''; position:absolute; inset:3px; border-radius:9999px;
    background:conic-gradient(from 0deg, transparent 0deg, transparent 300deg, rgba(226,163,59,.55) 355deg, #E2A33B 360deg);
    animation:sweep 1.4s linear infinite; }
  .loader::after { content:''; position:absolute; left:50%; top:50%; width:6px; height:6px; margin:-3px 0 0 -3px;
    border-radius:9999px; background:#E2A33B; }
  @keyframes sweep { to { transform:rotate(360deg); } }
  h1 { font-size:16px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; margin:0; }
  p { margin:0; font-size:14px; color:#8A93A6; max-width:320px; }
  button { margin-top:6px; min-height:44px; padding:10px 26px; border-radius:3px; border:1px solid #E2A33B;
           background:#E2A33B; color:#0A0C10; font-weight:600; font-size:14px; }
  @media (prefers-reduced-motion: reduce) { .loader::before { animation:none; opacity:0; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="loader" aria-hidden="true"></div>
    <h1>No signal</h1>
    <p>Excogni needs a connection - your measurements live on the server, not in the phone.</p>
    <button onclick="location.href='https://xcgni.com'">Retry</button>
  </div>
</body>
</html>
