# Production override. Use WITH the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# This turns OFF every development flag, requires secrets from the host
# environment (no hardcoded passwords), and stops exposing Postgres to the host.
# Set these in a .env file next to the compose files or in your shell:
#   POSTGRES_PASSWORD   strong random string
#   ORIGIN              https://your.domain
#   ADMIN_TOKEN         long random string (or omit to disable /admin)
#   ADMIN_TOTP_SECRET   from: node --experimental-strip-types scripts/gen-totp-secret.mjs
#   EMAIL_INDEX_KEY     >=32 random chars; enables the blind email index. Back it up
#                       like a database key - losing it means hashed emails stop matching.
#   SMTP_HOST/PORT/USER/PASS/FROM   transactional email
services:
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    # Postgres is bound to 127.0.0.1 in the base compose (loopback only - never reachable from the
    # internet). The app reaches it over the internal compose network by service name ("db"). We do
    # NOT use `ports: !reset` here: !reset needs Compose 2.24+ and silently dropped/!errored on the
    # deploy host, which is what broke the app's port mapping before. The base's 127.0.0.1 binding is
    # safe as-is, so the prod override leaves db ports untouched.

  app:
    environment:
      DATABASE_URL: postgres://excogni:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/excogni
      # all dev conveniences OFF
      ENABLE_SIMULATED_USERS: "false"
      ENABLE_LANGS: ${ENABLE_LANGS:-false}
      DEV_EXPOSE_MAGIC_LINKS: "false"
      SHOW_DEBUG_UI: "false"
      STATS_PREVIEW: "false"
      NODE_ENV: "production"
      ORIGIN: ${ORIGIN:?set ORIGIN to your https domain}
      PORT: "3000"
      # admin tool: blank disables it entirely
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      ADMIN_TOTP_SECRET: ${ADMIN_TOTP_SECRET:-}
      # blind email index: with this set, the readable login email is never stored
      EMAIL_INDEX_KEY: ${EMAIL_INDEX_KEY:-}
      ADMIN_MIN_CELL: ${ADMIN_MIN_CELL:-20}
      PUBLIC_MIN_CELL: ${PUBLIC_MIN_CELL:-50}
      # email delivery (magic links). If unset, links only reach stdout.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Excogni <no-reply@excogni.local>}
    restart: unless-stopped
    # Only Caddy (on the host) should reach the app, over loopback. Never publish to 0.0.0.0, or the
    # origin is hittable directly, bypassing Caddy + Cloudflare. Plain localhost binding (NO !reset -
    # that needs Compose 2.24+ and collapsed the mapping on the deploy host). The base binds the same
    # 127.0.0.1:3000; restating it here keeps the prod intent explicit.
    ports:
      - "127.0.0.1:3000:3000"
